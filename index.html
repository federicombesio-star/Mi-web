<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cauce · Comunicación Estratégica — Federico Besio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&family=Nunito+Sans:wght@300;400;500;600&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a18;
    --paper: #f6f4ef;
    --moss: #3d5a3e;
    --sage: #7a9e7e;
    --sand: #c9b99a;
    --warm: #e8e2d7;
    --accent: #2e4a2f;
    --muted: #7a7a72;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Nunito Sans', system-ui, sans-serif;
    --quote: 'Newsreader', Georgia, serif;
}
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    font-size: 16px;
}
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4vw;
    background: rgba(246, 244, 239, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--warm);
}
.nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-family: var(--serif);
    font-size: 1.55rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.01em;
}
.nav-logo svg { display: block; }
.nav-links {
    display: flex; gap: 2rem; list-style: none;
}
.nav-links a {
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
}
.nav-links a:hover { color: var(--moss); }
  #hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 4vw;
    padding-top: 80px;
    gap: 4rem;
    max-width: 1200px;
    margin: 0 auto;
}
.hero-text {}
.hero-eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1.5rem;
}
.hero-title {
    font-family: var(--serif);
    font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 1.0;
    color: var(--ink);
    margin-bottom: 1.8rem;
}
.hero-title em {
    font-style: italic;
    color: var(--moss);
}
.hero-quote {
    font-family: var(--quote);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--muted);
    line-height: 1.7;
    border-left: 2px solid var(--sand);
    padding-left: 1.2rem;
    margin-bottom: 2.5rem;
    max-width: 480px;
}
.hero-cta {
    display: inline-flex; align-items: center; gap: 0.7rem;
    background: var(--moss);
    color: white;
    text-decoration: none;
    padding: 0.85rem 2rem;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
}
.hero-cta:hover { background: var(--accent); transform: translateY(-2px); }
.hero-cta-arrow { font-size: 1.1rem; }
.hero-visual {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    align-items: flex-end;
}
.hero-card {
    background: white;
    border: 1px solid var(--warm);
    padding: 1.5rem 1.8rem;
    width: 100%;
    max-width: 360px;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s;
}
.hero-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(61,90,62,0.10); }
.hero-card-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.6rem;
}
.hero-card-value {
    font-family: var(--serif);
    font-size: 1.9rem;
    color: var(--ink);
    line-height: 1.1;
}
.hero-card-sub {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
}
.card-dot {
    position: absolute; top: 1.2rem; right: 1.2rem;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--sage);
}
  section { padding: 6rem 4vw; }
.container { max-width: 1100px; margin: 0 auto; }
.section-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1rem;
}
.section-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.1;
    margin-bottom: 1rem;
    color: var(--ink);
}
.section-title em { font-style: italic; color: var(--moss); }
.section-intro {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 560px;
    line-height: 1.75;
    margin-bottom: 3.5rem;
}
  #audiencias { background: var(--warm); }
.audience-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5px;
    background: var(--sand);
    border: 1.5px solid var(--sand);
}
.audience-item {
    background: var(--warm);
    padding: 2rem 1.5rem;
    transition: background 0.2s;
}
.audience-item:hover { background: white; }
.audience-icon { font-size: 2rem; margin-bottom: 1rem; }
.audience-name {
    font-family: var(--serif);
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
    color: var(--ink);
}
.audience-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.55; }
  #servicio { background: var(--paper); }
.servicio-intro-row {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 3rem;
    margin-bottom: 3.5rem;
    align-items: start;
}
.servicio-lede {
    font-size: 1.15rem;
    color: var(--ink);
    line-height: 1.75;
    font-weight: 300;
}
.servicio-lede strong { font-weight: 600; color: var(--moss); }
.servicio-frame {
    background: white;
    border: 1px solid var(--warm);
    border-left: 3px solid var(--moss);
    padding: 1.6rem 1.8rem;
    font-family: var(--quote);
    font-style: italic;
    font-size: 1.02rem;
    color: var(--muted);
    line-height: 1.7;
}
.includes-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5px;
    background: var(--sand);
    border: 1.5px solid var(--sand);
    margin-bottom: 1.2rem;
}
.includes-item {
    background: white;
    padding: 2rem 1.6rem;
    transition: background 0.2s;
}
.includes-item:hover { background: var(--warm); }
.includes-num {
    font-family: var(--serif);
    font-size: 1.6rem;
    color: var(--sand);
    margin-bottom: 0.8rem;
}
.includes-name {
    font-family: var(--serif);
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    color: var(--ink);
}
.includes-desc { font-size: 0.84rem; color: var(--muted); line-height: 1.55; }
.scope-note {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    background: var(--warm);
    border: 1px solid var(--sand);
    padding: 1.3rem 1.6rem;
    margin-top: 2rem;
}
.scope-note-icon { font-size: 1.2rem; line-height: 1.4; }
.scope-note-text { font-size: 0.88rem; color: var(--muted); line-height: 1.65; }
.scope-note-text strong { color: var(--ink); font-weight: 600; }
  #porque { background: var(--ink); color: var(--paper); }
  #porque .section-title { color: var(--paper); }
  #porque .section-intro { color: var(--sand); }
  #porque .section-label { color: var(--sage); }
.reasons-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    background: #2e2e2a;
}
.reason-item {
    background: var(--ink);
    padding: 2.5rem 2rem;
    transition: background 0.2s;
    border: 1px solid transparent;
}
.reason-item:hover { background: #262620; border-color: var(--moss); }
.reason-icon {
    width: 40px; height: 40px;
    border: 1px solid var(--moss);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
}
.reason-title {
    font-family: var(--serif);
    font-size: 1.3rem;
    color: var(--paper);
    margin-bottom: 0.7rem;
    line-height: 1.2;
}
.reason-desc { font-size: 0.88rem; color: #a09e97; line-height: 1.7; }
  #proceso { background: var(--paper); }
.timeline { display: flex; flex-direction: column; }
.timeline-item {
    display: grid;
    grid-template-columns: 96px 1fr auto;
    gap: 1.6rem;
    align-items: start;
    padding: 1.7rem 0;
    border-top: 1px solid var(--warm);
}
.timeline-item:last-child { border-bottom: 1px solid var(--warm); }
.timeline-item.is-free { background: var(--warm); margin: 0 -1.5rem; padding: 1.7rem 1.5rem; border-top: 1px solid var(--sand); border-bottom: 1px solid var(--sand); }
.timeline-phase {
    font-family: var(--serif);
    font-size: 0.95rem;
    color: var(--sage);
    letter-spacing: 0.02em;
    padding-top: 0.2rem;
}
.timeline-body {}
.timeline-name {
    font-family: var(--serif);
    font-size: 1.25rem;
    color: var(--ink);
    margin-bottom: 0.35rem;
}
.timeline-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.6; max-width: 520px; }
.timeline-time {
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    padding-top: 0.3rem;
    text-align: right;
}
.timeline-time span { display: block; font-size: 0.7rem; color: var(--sage); margin-top: 0.2rem; }
  #precios { background: var(--warm); }
.pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
}
.price-card {
    background: white;
    padding: 2.2rem 1.8rem;
    border: 1px solid var(--warm);
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
}
.price-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(61,90,62,0.12); }
.price-card.featured {
    background: var(--moss);
    border-color: var(--moss);
    color: white;
}
.price-card.featured .price-label,
.price-card.featured .price-desc,
.price-card.featured .price-includes { color: rgba(255,255,255,0.75); }
.price-card.featured .price-value,
.price-card.featured .price-name { color: white; }
.price-label {
    font-size: 0.74rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.8rem;
}
.price-name {
    font-family: var(--serif);
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--ink);
}
.price-value {
    font-family: var(--serif);
    font-size: 1.7rem;
    color: var(--moss);
    margin: 1rem 0 0.3rem;
    line-height: 1.15;
}
.price-period {
    font-size: 0.83rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
}
.price-card.featured .price-period { color: rgba(255,255,255,0.65); }
.price-desc {
    font-size: 0.87rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 1.2rem;
}
.price-cap {
    font-size: 0.76rem;
    letter-spacing: 0.03em;
    color: var(--sage);
    border-top: 1px solid var(--warm);
    padding-top: 0.9rem;
    margin-top: 0.4rem;
}
.price-card.featured .price-cap { color: var(--sand); border-top-color: rgba(255,255,255,0.2); }
  #contacto {
    background: var(--ink);
    text-align: center;
    padding: 7rem 4vw;
}
  #contacto .section-label { text-align: center; }
.cta-title {
    font-family: var(--serif);
    font-size: clamp(2.5rem, 5vw, 4rem);
    color: var(--paper);
    margin-bottom: 1rem;
    line-height: 1.1;
}
.cta-title em { font-style: italic; color: var(--sage); }
.cta-sub {
    font-size: 1.05rem;
    color: #a09e97;
    margin-bottom: 2.5rem;
}
.cta-buttons {
    display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
}
.btn-primary {
    background: var(--sage);
    color: white;
    text-decoration: none;
    padding: 0.9rem 2.2rem;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: background 0.2s;
    font-family: var(--sans);
}
.btn-primary:hover { background: var(--moss); }
.btn-secondary {
    background: transparent;
    color: var(--paper);
    text-decoration: none;
    padding: 0.9rem 2.2rem;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    border: 1px solid #3a3a36;
    transition: border-color 0.2s, color 0.2s;
    font-family: var(--sans);
}
.btn-secondary:hover { border-color: var(--sage); color: var(--sage); }
.contact-info {
    margin-top: 3rem;
    font-size: 0.85rem;
    color: #5a5a54;
    display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
}
.contact-info a { color: #5a5a54; text-decoration: none; transition: color 0.2s; }
.contact-info a:hover { color: var(--sage); }
  footer {
    background: #111110;
    padding: 2rem 4vw;
    text-align: center;
    font-size: 0.78rem;
    color: #3a3a36;
    letter-spacing: 0.05em;
}
  @media (max-width: 900px) {
    #hero { grid-template-columns: 1fr; min-height: auto; padding-top: 100px; padding-bottom: 4rem; }
.hero-visual { align-items: flex-start; }
.audience-grid { grid-template-columns: 1fr 1fr; }
.includes-grid { grid-template-columns: 1fr 1fr; }
.servicio-intro-row { grid-template-columns: 1fr; }
.reasons-grid { grid-template-columns: 1fr; }
.timeline-item { grid-template-columns: 60px 1fr; }
.timeline-time { grid-column: 2; text-align: left; padding-top: 0; }
.pricing-grid { grid-template-columns: 1fr; }
.nav-links { display: none; }
}
  @media (max-width: 600px) {
.audience-grid { grid-template-columns: 1fr; }
.includes-grid { grid-template-columns: 1fr; }
.hero-title { font-size: 2.8rem; }
}
.reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.65s ease, transform 0.65s ease;
}
.reveal.visible {
    opacity: 1;
    transform: none;
}
</style>
</head>
