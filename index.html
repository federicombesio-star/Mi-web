<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cauce · Consultoría de impacto — Federico Besio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&family=Nunito+Sans:wght@300;400;500;600&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1a18;
    --paper:     #f6f4ef;
    --moss:      #3d5a3e;
    --sage:      #7a9e7e;
    --sand:      #c9b99a;
    --warm:      #e8e2d7;
    --accent:    #2e4a2f;
    --muted:     #7a7a72;
    --serif:     'Fraunces', Georgia, serif;
    --sans:      'Nunito Sans', system-ui, sans-serif;
    --quote:     'Newsreader', Georgia, serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    font-size: 16px;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4vw;
    background: rgba(246, 244, 239, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--warm);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-family: var(--serif);
    font-size: 1.55rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.01em;
  }
  .nav-logo svg { display: block; }
  .nav-links {
    display: flex; gap: 2rem; list-style: none;
  }
  .nav-links a {
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--moss); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 4vw;
    padding-top: 80px;
    gap: 4rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-text {}
  .hero-eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1.5rem;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 1.0;
    color: var(--ink);
    margin-bottom: 1.8rem;
  }
  .hero-title em {
    font-style: italic;
    color: var(--moss);
  }
  .hero-quote {
    font-family: var(--quote);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--muted);
    line-height: 1.7;
    border-left: 2px solid var(--sand);
    padding-left: 1.2rem;
    margin-bottom: 2.5rem;
    max-width: 480px;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 0.7rem;
    background: var(--moss);
    color: white;
    text-decoration: none;
    padding: 0.85rem 2rem;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
  }
  .hero-cta:hover { background: var(--accent); transform: translateY(-2px); }
  .hero-cta-arrow { font-size: 1.1rem; }

  .hero-visual {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    align-items: flex-end;
  }
  .hero-card {
    background: white;
    border: 1px solid var(--warm);
    padding: 1.5rem 1.8rem;
    width: 100%;
    max-width: 360px;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .hero-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(61,90,62,0.10); }
  .hero-card-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.6rem;
  }
  .hero-card-value {
    font-family: var(--serif);
    font-size: 1.9rem;
    color: var(--ink);
    line-height: 1.1;
  }
  .hero-card-sub {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .card-dot {
    position: absolute; top: 1.2rem; right: 1.2rem;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--sage);
  }

  /* ── SECTION SHARED ── */
  section { padding: 6rem 4vw; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.1;
    margin-bottom: 1rem;
    color: var(--ink);
  }
  .section-title em { font-style: italic; color: var(--moss); }
  .section-intro {
    font-size: 1.05rem;
    color: var(--muted);
    max-width: 560px;
    line-height: 1.75;
    margin-bottom: 3.5rem;
  }

  /* ── AUDIENCIAS ── */
  #audiencias { background: var(--warm); }
  .audience-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5px;
    background: var(--sand);
    border: 1.5px solid var(--sand);
  }
  .audience-item {
    background: var(--warm);
    padding: 2rem 1.5rem;
    transition: background 0.2s;
  }
  .audience-item:hover { background: white; }
  .audience-icon { font-size: 2rem; margin-bottom: 1rem; }
  .audience-name {
    font-family: var(--serif);
    font-size: 1.2rem;
